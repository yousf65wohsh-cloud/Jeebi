<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جيبي - إدارة المصاريف</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Cairo', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Cairo', system-ui, sans-serif; background: #f8fafc; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    @keyframes slide-down {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-down { animation: slide-down 0.3s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { createContext, useContext, useState, useEffect, useCallback, useRef, useMemo } = React;

    const AppContext = createContext();
    const STORAGE_KEY = 'jeebi_data';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return { balance: 0, categories: [], transactions: [] };
    }

    const DEFAULT_CATEGORIES = [
      { id: 'cat_1', name: 'إيجار', color: '#ef4444', budget: 0 },
      { id: 'cat_2', name: 'إنترنت', color: '#3b82f6', budget: 0 },
      { id: 'cat_3', name: 'مطاعم', color: '#f59e0b', budget: 0 },
      { id: 'cat_4', name: 'مواصلات', color: '#10b981', budget: 0 },
      { id: 'cat_5', name: 'تسوق', color: '#ec4899', budget: 0 },
      { id: 'cat_6', name: 'أخرى', color: '#8b5cf6', budget: 0 },
    ];

    const COLORS = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];

    function AppProvider({ children }) {
      const [data, setData] = useState(loadData);
      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }, [data]);

      const totalExpenses = data.transactions.reduce((s, t) => s + t.amount, 0);
      const remainingBalance = data.balance - totalExpenses;
      const totalBudgets = data.categories.reduce((s, c) => s + (c.budget || 0), 0);

      const getCatStats = useCallback((catId) => {
        const cat = data.categories.find((c) => c.id === catId);
        const spent = data.transactions
          .filter((t) => t.categoryId === catId)
          .reduce((s, t) => s + t.amount, 0);
        return {
          budget: cat?.budget || 0,
          spent,
          remaining: (cat?.budget || 0) - spent,
          pct: cat?.budget > 0 ? (spent / cat.budget) * 100 : 0,
          cat,
        };
      }, [data.categories, data.transactions]);

      const showToast = useCallback((message, type = 'warning') => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ message, type, id: Date.now() });
        toastTimer.current = setTimeout(() => setToast(null), 4000);
      }, []);

      const hideToast = useCallback(() => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast(null);
      }, []);

      const setBalance = useCallback((amount) => {
        setData((prev) => ({ ...prev, balance: amount }));
      }, []);

      const addCategory = useCallback((name, color, budget) => {
        setData((prev) => ({
          ...prev,
          categories: [...prev.categories, { id: 'cat_' + Date.now(), name, color, budget: budget || 0 }],
        }));
      }, []);

      const updateCategoryBudget = useCallback((id, budget) => {
        setData((prev) => ({
          ...prev,
          categories: prev.categories.map((c) => c.id === id ? { ...c, budget: budget || 0 } : c),
        }));
      }, []);

      const removeCategory = useCallback((id) => {
        setData((prev) => ({
          ...prev,
          categories: prev.categories.filter((c) => c.id !== id),
        }));
      }, []);

      const addTransaction = useCallback((amount, categoryId, description, date) => {
        setData((prev) => ({
          ...prev,
          transactions: [
            { id: 'txn_' + Date.now(), amount, categoryId, description, date: date || new Date().toISOString() },
            ...prev.transactions,
          ],
        }));
      }, []);

      const updateTransaction = useCallback((id, updates) => {
        setData((prev) => ({
          ...prev,
          transactions: prev.transactions.map((t) => t.id === id ? { ...t, ...updates } : t),
        }));
      }, []);

      const removeTransaction = useCallback((id) => {
        setData((prev) => ({
          ...prev,
          transactions: prev.transactions.filter((t) => t.id !== id),
        }));
      }, []);

      const resetToDefaults = useCallback(() => {
        setData({ balance: 0, categories: [...DEFAULT_CATEGORIES], transactions: [] });
      }, []);

      return (
        <AppContext.Provider value={{
          ...data,           totalExpenses, remainingBalance,
          toast, showToast, hideToast, getCatStats,
          setBalance, addCategory, updateCategoryBudget, removeCategory,
          addTransaction, updateTransaction, removeTransaction, resetToDefaults,
        }}>
          {children}
        </AppContext.Provider>
      );
    }

    function useApp() {
      const ctx = useContext(AppContext);
      if (!ctx) throw new Error('useApp must be used within AppProvider');
      return ctx;
    }

    function fmt(n) {
      try { return n.toLocaleString('en-US'); } catch { return n.toLocaleString(); }
    }

    function Toast() {
      const { toast, hideToast } = useApp();
      if (!toast) return null;
      const colors = {
        warning: 'bg-amber-50 border-amber-200 text-amber-800',
        danger: 'bg-red-50 border-red-200 text-red-800',
        info: 'bg-blue-50 border-blue-200 text-blue-800',
      };
      return (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] animate-slide-down">
          <div className={`flex items-center gap-3 px-5 py-3 rounded-xl border shadow-lg ${colors[toast.type] || colors.warning}`}>
            <i data-lucide="alert-triangle" className="w-5 h-5 shrink-0"></i>
            <p className="text-sm font-medium">{toast.message}</p>
            <button onClick={hideToast} className="opacity-60 hover:opacity-100 cursor-pointer">
              <i data-lucide="x" className="w-4 h-4"></i>
            </button>
          </div>
        </div>
      );
    }

    function Dashboard() {
      const { balance, remainingBalance, totalExpenses, setBalance } = useApp();
      const [editing, setEditing] = useState(false);
      const [inputVal, setInputVal] = useState('');

      const handleSave = () => {
        const val = parseFloat(inputVal);
        if (!isNaN(val) && val >= 0) setBalance(val);
        setEditing(false);
        setInputVal('');
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-center justify-between mb-2">
              <span className="text-gray-500 text-sm font-medium">الرصيد الكلي</span>
              <i data-lucide="wallet" className="w-5 h-5 text-blue-500"></i>
            </div>
            {editing ? (
              <div className="flex gap-2">
                <input type="number" value={inputVal}
                  onChange={(e) => setInputVal(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && handleSave()}
                  className="w-full border border-gray-200 rounded-lg px-3 py-1 text-lg font-bold outline-none focus:border-blue-400" autoFocus />
                <button onClick={handleSave}
                  className="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-600 cursor-pointer">حفظ</button>
              </div>
            ) : (
              <div className="text-2xl font-bold text-gray-800 cursor-pointer hover:text-blue-600"
                onClick={() => setEditing(true)}>
                {fmt(balance)} د.ع
              </div>
            )}
            <p className="text-xs text-gray-400 mt-1">اضغط لتعديل الرصيد</p>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-center justify-between mb-2">
              <span className="text-gray-500 text-sm font-medium">إجمالي المصاريف</span>
              <i data-lucide="trending-down" className="w-5 h-5 text-red-500"></i>
            </div>
            <div className="text-2xl font-bold text-red-500">{fmt(totalExpenses)} د.ع</div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-center justify-between mb-2">
              <span className="text-gray-500 text-sm font-medium">الرصيد المتبقي</span>
              <i data-lucide="piggy-bank" className="w-5 h-5 text-green-500"></i>
            </div>
            <div className={`text-2xl font-bold ${remainingBalance >= 0 ? 'text-green-500' : 'text-red-500'}`}>
              {fmt(remainingBalance)} د.ع
            </div>
          </div>
        </div>
      );
    }

    function TransactionForm() {
      const { categories, addTransaction, getCatStats, showToast } = useApp();
      const [amount, setAmount] = useState('');
      const [categoryId, setCategoryId] = useState(categories[0]?.id || '');
      const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
      const [description, setDescription] = useState('');
      const [overConfirm, setOverConfirm] = useState(null);

      useEffect(() => {
        if (!categoryId && categories.length > 0) setCategoryId(categories[0].id);
      }, [categories]);

      const doSubmit = (force) => {
        const val = parseFloat(amount);
        if (isNaN(val) || val <= 0 || !categoryId) return;
        if (!force) {
          const stats = getCatStats(categoryId);
          if (stats.budget > 0 && val > stats.remaining) {
            setOverConfirm({ val, date, description });
            return;
          }
        }
        addTransaction(val, categoryId, description.trim(), new Date(date).toISOString());
        const stats = getCatStats(categoryId);
        const newPct = stats.budget > 0 ? ((stats.spent + val) / stats.budget) * 100 : 0;
        if (!force && newPct >= 90) {
           showToast(`⚠️ لقد استهلكت ${newPct.toFixed(0)}% من رصيد ${stats.cat?.name}`, 'warning');
        }
        setAmount('');
        setDescription('');
        setDate(new Date().toISOString().slice(0, 10));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        doSubmit(false);
      };

      const confirmOverBudget = () => {
        if (!overConfirm) return;
        const val = parseFloat(amount);
        if (isNaN(val) || val <= 0 || !categoryId) return;
        addTransaction(val, categoryId, description.trim(), new Date(date).toISOString());
        const stats = getCatStats(categoryId);
        showToast(`⚠️ تم تجاوز رصيد ${stats.cat?.name}`, 'danger');
        setOverConfirm(null);
        setAmount('');
        setDescription('');
        setDate(new Date().toISOString().slice(0, 10));
      };

      return (
        <>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-center gap-2 mb-4">
              <i data-lucide="plus-circle" className="w-5 h-5 text-emerald-500"></i>
              <h2 className="text-lg font-bold text-gray-800">مصروف جديد</h2>
            </div>
            <form onSubmit={handleSubmit} className="space-y-3">
              <div className="flex gap-3">
                <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)}
                  placeholder="المبلغ" className="flex-1 border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-emerald-400" required min="1" />
                <select value={categoryId} onChange={(e) => setCategoryId(e.target.value)}
                  className="border border-gray-200 rounded-lg px-3 py-2.5 outline-none focus:border-emerald-400 bg-white">
                  {categories.map((cat) => (
                    <option key={cat.id} value={cat.id}>{cat.name}</option>
                  ))}
                </select>
              </div>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-emerald-400" />
              <input type="text" value={description} onChange={(e) => setDescription(e.target.value)}
                placeholder="ملاحظة (اختياري)"
                className="w-full border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-emerald-400" />
              <button type="submit"
                className="w-full bg-emerald-500 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-600 cursor-pointer">
                إضافة المصروف
              </button>
            </form>
          </div>

          {overConfirm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                <i data-lucide="alert-triangle" className="w-12 h-12 text-red-500 mx-auto mb-3"></i>
                <h3 className="text-lg font-bold text-gray-800 mb-2">تجاوز الرصيد!</h3>
                <p className="text-sm text-gray-500 mb-2">هذا المصروف سيتجاوز الرصيد المخصص لهذه المحفظة.</p>
                <p className="text-xs text-gray-400 mb-6">هل تريد المتابعة على أي حال؟</p>
                <div className="flex gap-3">
                  <button onClick={() => setOverConfirm(null)}
                    className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 cursor-pointer">إلغاء</button>
                  <button onClick={confirmOverBudget}
                    className="flex-1 bg-red-500 text-white py-2.5 rounded-lg font-medium hover:bg-red-600 cursor-pointer">متابعة على الرغم من ذلك</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function barColor(pct) {
      if (pct >= 100) return '#ef4444';
      if (pct >= 75) return '#f59e0b';
      return '#10b981';
    }

    function CategoryManager() {
      const { categories, transactions, addCategory, updateCategoryBudget, removeCategory, addTransaction, getCatStats, showToast } = useApp();
      const [showForm, setShowForm] = useState(false);
      const [name, setName] = useState('');
      const [color, setColor] = useState('#3b82f6');
      const [budget, setBudget] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      const [txnForm, setTxnForm] = useState({ catId: null, amount: '', date: '', description: '' });
      const [overConfirm, setOverConfirm] = useState(null);

      const catTxns = useMemo(() => {
        const map = {};
        categories.forEach((c) => { map[c.id] = []; });
        transactions.forEach((t) => { if (map[t.categoryId]) map[t.categoryId].push(t); });
        return map;
      }, [categories, transactions]);

      const handleAdd = () => {
        if (!name.trim()) return;
        addCategory(name.trim(), color, parseFloat(budget) || 0);
        setName('');
        setColor('#3b82f6');
        setBudget('');
        setShowForm(false);
      };

      const doAddTxn = (catId) => {
        const val = parseFloat(txnForm.amount);
        if (isNaN(val) || val <= 0) return;
        const stats = getCatStats(catId);
        if (stats.budget > 0 && val > stats.remaining) {
          setOverConfirm({ catId, amount: val, description: txnForm.description, date: txnForm.date });
          return;
        }
        addTransaction(val, catId, txnForm.description, new Date(txnForm.date || new Date()).toISOString());
        const newPct = stats.budget > 0 ? ((stats.spent + val) / stats.budget) * 100 : 0;
        if (newPct >= 90) {
           showToast(`⚠️ لقد استهلكت ${newPct.toFixed(0)}% من رصيد ${stats.cat?.name}`, 'warning');
        }
        setTxnForm({ catId: null, amount: '', date: '', description: '' });
      };

      const confirmOverBudget = () => {
        if (!overConfirm) return;
        addTransaction(overConfirm.amount, overConfirm.catId, overConfirm.description, new Date(overConfirm.date || new Date()).toISOString());
        const stats = getCatStats(overConfirm.catId);
        showToast(`⚠️ تم تجاوز رصيد ${stats.cat?.name}`, 'danger');
        setOverConfirm(null);
        setTxnForm({ catId: null, amount: '', date: '', description: '' });
      };

      const today = new Date().toISOString().slice(0, 10);

      return (
        <>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <i data-lucide="tag" className="w-5 h-5 text-purple-500"></i>
                <h2 className="text-lg font-bold text-gray-800">المحفظات</h2>
              </div>
              <button onClick={() => setShowForm(!showForm)}
                className="flex items-center gap-1 text-sm bg-purple-50 text-purple-600 px-3 py-1.5 rounded-lg hover:bg-purple-100 cursor-pointer">
                <i data-lucide="plus" className="w-4 h-4"></i> إضافة محفظة
              </button>
            </div>

            {showForm && (
              <div className="mb-4 p-4 bg-gray-50 rounded-xl">
                <input type="text" value={name} onChange={(e) => setName(e.target.value)}
                  placeholder="اسم المحفظة"
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 mb-3 outline-none focus:border-purple-400"
                  onKeyDown={(e) => e.key === 'Enter' && handleAdd()} />
                <div className="flex flex-wrap gap-2 mb-3">
                  {COLORS.map((c) => (
                    <button key={c} onClick={() => setColor(c)}
                      className={`w-7 h-7 rounded-full border-2 cursor-pointer ${color === c ? 'border-gray-800 scale-110' : 'border-transparent'}`}
                      style={{ backgroundColor: c }} />
                  ))}
                </div>
                <input type="number" value={budget} onChange={(e) => setBudget(e.target.value)}
                  placeholder="المبلغ المخصص (د.ع)"
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 mb-3 outline-none focus:border-purple-400" min="0" />
                <button onClick={handleAdd}
                  className="w-full bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600 cursor-pointer">إضافة محفظة</button>
              </div>
            )}

            {categories.length === 0 ? (
              <p className="text-gray-400 text-sm text-center py-6">لا توجد محفظات بعد</p>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {categories.map((cat) => {
                  const stats = getCatStats(cat.id);
                  const pct = stats.budget > 0 ? Math.min((stats.spent / stats.budget) * 100, 100) : 0;
                  const txns = catTxns[cat.id] || [];
                  return (
                    <div key={cat.id} className="border border-gray-100 rounded-xl p-4 hover:shadow-sm transition-shadow">
                      <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                          <span className="w-3 h-3 rounded-full" style={{ backgroundColor: cat.color }} />
                          <span className="font-bold text-gray-800">{cat.name}</span>
                          {pct >= 90 && (
                            <i data-lucide="alert-triangle" className={`w-4 h-4 ${pct >= 100 ? 'text-red-500' : 'text-amber-500'}`}></i>
                          )}
                        </div>
                        <button onClick={() => removeCategory(cat.id)}
                          className="text-gray-300 hover:text-red-500 cursor-pointer">
                          <i data-lucide="trash-2" className="w-4 h-4"></i>
                        </button>
                      </div>

                      <div className="flex items-center gap-3 mb-2 text-xs">
                        <input type="number" value={cat.budget || ''}
                          onChange={(e) => updateCategoryBudget(cat.id, parseFloat(e.target.value) || 0)}
                          className="w-24 border border-gray-200 rounded px-2 py-1 text-center outline-none focus:border-purple-400"
                          placeholder="الرصيد" min="0" />
                        <span className="text-gray-400">|</span>
                        <span className={`font-medium ${pct >= 75 ? 'text-red-500' : 'text-gray-600'}`}>{fmt(stats.spent)} د.ع</span>
                        <span className="text-gray-400">|</span>
                        <span className={`font-medium ${stats.remaining >= 0 ? 'text-green-500' : 'text-red-500'}`}>{fmt(stats.remaining)} د.ع</span>
                      </div>

                      <div className="w-full h-2.5 bg-gray-100 rounded-full mb-1.5 overflow-hidden">
                        <div className="h-full rounded-full transition-all duration-300"
                          style={{ width: pct + '%', backgroundColor: barColor(pct) }} />
                      </div>
                      <div className="flex justify-between text-xs text-gray-400 mb-2">
                        <span>{fmt(stats.budget)} د.ع</span>
                        <span className="font-medium" style={{ color: barColor(pct) }}>{pct.toFixed(0)}%</span>
                      </div>

                      <button onClick={() => setExpandedId(expandedId === cat.id ? null : cat.id)}
                        className="flex items-center gap-1 text-xs text-purple-600 hover:text-purple-800 cursor-pointer">
                        <i data-lucide={expandedId === cat.id ? 'chevron-up' : 'chevron-down'} className="w-3.5 h-3.5"></i>
                        {expandedId === cat.id ? 'إخفاء المعاملات' : 'عرض المعاملات'}
                      </button>

                      {expandedId === cat.id && (
                        <div className="mt-3 space-y-2">
                          {txnForm.catId === cat.id ? (
                            <div className="p-3 bg-gray-50 rounded-lg space-y-2">
                              <input type="number" value={txnForm.amount}
                                onChange={(e) => setTxnForm({ ...txnForm, amount: e.target.value })}
                                placeholder="المبلغ"
                                className="w-full border border-gray-200 rounded px-2 py-1.5 text-sm outline-none focus:border-purple-400" min="1" />
                              <input type="date" value={txnForm.date}
                                onChange={(e) => setTxnForm({ ...txnForm, date: e.target.value })}
                                className="w-full border border-gray-200 rounded px-2 py-1.5 text-sm outline-none focus:border-purple-400" />
                              <input type="text" value={txnForm.description}
                                onChange={(e) => setTxnForm({ ...txnForm, description: e.target.value })}
                                placeholder="ملاحظة"
                                className="w-full border border-gray-200 rounded px-2 py-1.5 text-sm outline-none focus:border-purple-400" />
                              <div className="flex gap-2">
                                <button onClick={() => setTxnForm({ ...txnForm, catId: null })}
                                  className="flex-1 text-xs border border-gray-200 text-gray-600 py-1.5 rounded hover:bg-gray-100 cursor-pointer">إلغاء</button>
                                <button onClick={() => doAddTxn(cat.id)}
                                  className="flex-1 text-xs bg-emerald-500 text-white py-1.5 rounded hover:bg-emerald-600 cursor-pointer">إضافة</button>
                              </div>
                            </div>
                          ) : (
                            <button onClick={() => setTxnForm({ catId: cat.id, amount: '', date: today, description: '' })}
                              className="w-full text-xs border border-dashed border-gray-300 text-gray-500 py-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                              + إضافة مصروف
                            </button>
                          )}
                          {txns.length === 0 && txnForm.catId !== cat.id ? (
                            <p className="text-xs text-gray-400 text-center py-3">لا توجد معاملات</p>
                          ) : (
                            <div className="space-y-1 max-h-48 overflow-y-auto">
                              {txns.map((txn) => (
                                <div key={txn.id} className="flex items-center justify-between py-1.5 px-2 bg-gray-50 rounded-lg text-xs">
                                  <div className="flex items-center gap-2">
                                    <span className="text-gray-400">{new Date(txn.date).toLocaleDateString('en-US')}</span>
                                    {txn.description && <span className="text-gray-500 truncate max-w-24">{txn.description}</span>}
                                  </div>
                                  <span className="font-medium text-red-500">-{fmt(txn.amount)} د.ع</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {overConfirm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                <i data-lucide="alert-triangle" className="w-12 h-12 text-red-500 mx-auto mb-3"></i>
                <h3 className="text-lg font-bold text-gray-800 mb-2">تجاوز الرصيد!</h3>
                <p className="text-sm text-gray-500 mb-2">هذا المصروف سيتجاوز الرصيد المخصص لهذه المحفظة.</p>
                <p className="text-xs text-gray-400 mb-6">هل تريد المتابعة على أي حال؟</p>
                <div className="flex gap-3">
                  <button onClick={() => setOverConfirm(null)}
                    className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 cursor-pointer">إلغاء</button>
                  <button onClick={confirmOverBudget}
                    className="flex-1 bg-red-500 text-white py-2.5 rounded-lg font-medium hover:bg-red-600 cursor-pointer">متابعة على الرغم من ذلك</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function EditTransactionModal({ transaction, onClose }) {
      const { categories, updateTransaction } = useApp();
      const [amount, setAmount] = useState('');
      const [categoryId, setCategoryId] = useState('');
      const [date, setDate] = useState('');
      const [description, setDescription] = useState('');

      useEffect(() => {
        if (!transaction) return;
        setAmount(String(transaction.amount));
        setCategoryId(transaction.categoryId);
        setDate(transaction.date ? transaction.date.slice(0, 10) : '');
        setDescription(transaction.description || '');
      }, [transaction]);

      const handleSubmit = (e) => {
        e.preventDefault();
        const val = parseFloat(amount);
        if (isNaN(val) || val <= 0 || !categoryId) return;
        const updates = { amount: val, categoryId, description: description.trim() };
        if (date) updates.date = new Date(date + 'T00:00:00').toISOString();
        updateTransaction(transaction.id, updates);
        onClose();
      };

      if (!transaction) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4">
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div className="flex items-center justify-between p-5 border-b border-gray-100">
              <h3 className="text-lg font-bold text-gray-800">تعديل المعاملة</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 cursor-pointer">
                <i data-lucide="x" className="w-5 h-5"></i>
              </button>
            </div>
            <form onSubmit={handleSubmit} className="p-5 space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-1">المبلغ</label>
                <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)}
                  className="w-full border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-blue-400" required min="1" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-1">المحفظة</label>
                <select value={categoryId} onChange={(e) => setCategoryId(e.target.value)}
                  className="w-full border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-blue-400 bg-white">
                  {categories.map((cat) => (
                    <option key={cat.id} value={cat.id}>{cat.name}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-1">التاريخ</label>
                <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
                  className="w-full border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-blue-400" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-1">ملاحظة</label>
                <input type="text" value={description} onChange={(e) => setDescription(e.target.value)}
                  placeholder="ملاحظة (اختياري)"
                  className="w-full border border-gray-200 rounded-lg px-4 py-2.5 outline-none focus:border-blue-400" />
              </div>
              <div className="flex gap-3 pt-2">
                <button type="button" onClick={onClose}
                  className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 cursor-pointer">إلغاء</button>
                <button type="submit"
                  className="flex-1 bg-blue-500 text-white py-2.5 rounded-lg font-medium hover:bg-blue-600 cursor-pointer">حفظ التعديلات</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function TransactionList() {
      const { transactions, categories, removeTransaction } = useApp();
      const [editTxn, setEditTxn] = useState(null);
      const [deleteId, setDeleteId] = useState(null);

      const getCategory = (id) => categories.find((c) => c.id === id);

      const confirmDelete = () => {
        if (deleteId) {
          removeTransaction(deleteId);
          setDeleteId(null);
        }
      };

      return (
        <>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-center gap-2 mb-4">
              <i data-lucide="receipt" className="w-5 h-5 text-orange-500"></i>
              <h2 className="text-lg font-bold text-gray-800">آخر المعاملات</h2>
            </div>
            {transactions.length === 0 ? (
              <p className="text-gray-400 text-sm text-center py-6">لا توجد معاملات بعد</p>
            ) : (
              <div className="space-y-2 max-h-80 overflow-y-auto">
                {transactions.map((txn) => {
                  const cat = getCategory(txn.categoryId);
                  return (
                    <div key={txn.id}
                      className="flex items-center justify-between p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors">
                      <div className="flex items-center gap-3 min-w-0">
                        <span className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: cat?.color || '#9ca3af' }} />
                        <div className="min-w-0">
                          <p className="text-sm font-medium text-gray-800 truncate">{cat?.name || 'غير محدد'}</p>
                          <div className="flex items-center gap-2 text-xs text-gray-400">
                            {txn.description && <span className="truncate">{txn.description}</span>}
                            {txn.date && <span>{new Date(txn.date).toLocaleDateString('en-US')}</span>}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2 shrink-0">
                        <span className="text-sm font-bold text-red-500">-{fmt(txn.amount)} د.ع</span>
                        <button onClick={() => setEditTxn(txn)}
                          className="text-gray-300 hover:text-blue-500 cursor-pointer">
                          <i data-lucide="pencil" className="w-4 h-4"></i>
                        </button>
                        <button onClick={() => setDeleteId(txn.id)}
                          className="text-gray-300 hover:text-red-500 cursor-pointer">
                          <i data-lucide="trash-2" className="w-4 h-4"></i>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {editTxn && <EditTransactionModal transaction={editTxn} onClose={() => setEditTxn(null)} />}

          {deleteId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                <i data-lucide="alert-triangle" className="w-12 h-12 text-red-400 mx-auto mb-3"></i>
                <h3 className="text-lg font-bold text-gray-800 mb-2">تأكيد الحذف</h3>
                <p className="text-sm text-gray-500 mb-6">هل أنت متأكد من حذف هذه المعاملة؟</p>
                <div className="flex gap-3">
                  <button onClick={() => setDeleteId(null)}
                    className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 cursor-pointer">إلغاء</button>
                  <button onClick={confirmDelete}
                    className="flex-1 bg-red-500 text-white py-2.5 rounded-lg font-medium hover:bg-red-600 cursor-pointer">حذف</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function Reports() {
      const { transactions, categories } = useApp();
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      const data = useMemo(() => {
        const map = {};
        transactions.forEach((txn) => {
          const cat = categories.find((c) => c.id === txn.categoryId);
          const name = cat?.name || 'غير محدد';
          const color = cat?.color || '#9ca3af';
          if (!map[name]) map[name] = { name, value: 0, color };
          map[name].value += txn.amount;
        });
        return Object.values(map);
      }, [transactions, categories]);

      useEffect(() => {
        if (!canvasRef.current || data.length === 0) return;
        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.map((d) => d.name),
            datasets: [{
              data: data.map((d) => d.value),
              backgroundColor: data.map((d) => d.color),
              borderWidth: 0,
            }],
          },
          options: {
            cutout: '60%',
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.label}: ${fmt(ctx.parsed)} د.ع`,
                },
              },
            },
          },
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data]);

      const total = data.reduce((s, d) => s + d.value, 0);

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
          <div className="flex items-center gap-2 mb-4">
            <i data-lucide="bar-chart-3" className="w-5 h-5 text-indigo-500"></i>
            <h2 className="text-lg font-bold text-gray-800">التقارير</h2>
          </div>
          {data.length === 0 ? (
            <p className="text-gray-400 text-sm text-center py-6">لا توجد بيانات للعرض</p>
          ) : (
            <>
              <div className="flex justify-center">
                <canvas ref={canvasRef} width="220" height="220" style={{ maxWidth: 220, maxHeight: 220 }}></canvas>
              </div>
              <div className="flex flex-wrap justify-center gap-3 mt-2">
                {data.map((d) => (
                  <div key={d.name} className="flex items-center gap-1.5 text-xs">
                    <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: d.color }} />
                    <span className="text-gray-600">{d.name}</span>
                    <span className="font-medium text-gray-800">({(d.value / total * 100).toFixed(1)}%)</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    function App() {
      useEffect(() => {
        if (window.lucide) lucide.createIcons();
      });

      return (
        <AppProvider>
          <Toast />
          <div className="min-h-screen bg-gray-50" dir="rtl">
            <header className="bg-white border-b border-gray-100 sticky top-0 z-10">
              <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                <h1 className="text-xl font-bold text-gray-800">جيبي</h1>
                <span className="text-xs text-gray-400">إدارة المصاريف الشخصية</span>
              </div>
            </header>
            <main className="max-w-4xl mx-auto px-4 py-6 space-y-6">
              <Dashboard />
              <CategoryManager />
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <TransactionForm />
                <Reports />
              </div>
              <TransactionList />
            </main>
            <footer className="text-center py-6 text-xs text-gray-400">
              جيبي &copy; {new Date().getFullYear()} &mdash; تطبيق مفتوح المصدر
            </footer>
          </div>
        </AppProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
